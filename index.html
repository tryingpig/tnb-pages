<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TNB Pages</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #111111;
    --muted: #8a8a8a;
    --line: #ececec;
    --hover: #f6f6f4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e0e0e; --fg: #f2f2f2; --muted: #8f8f8f;
      --line: #232323; --hover: #1a1a1a;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
      "Apple SD Gothic Neo", "Malgun Gothic", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 12vh 24px 16vh; }
  header { margin-bottom: 10vh; }
  h1 {
    font-size: clamp(2.2rem, 6vw, 3.6rem); font-weight: 600;
    letter-spacing: -0.03em; margin: 0 0 0.4rem;
  }
  .subtitle { color: var(--muted); font-size: 0.95rem; letter-spacing: 0.01em; }
  .count { color: var(--muted); font-size: 0.8rem; margin-top: 0.6rem;
           text-transform: uppercase; letter-spacing: 0.12em; }
  ul { list-style: none; margin: 0; padding: 0; border-top: 1px solid var(--line); }
  .item { border-bottom: 1px solid var(--line); }
  .item-link {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 1.5rem; padding: 1.5rem 0.5rem; text-decoration: none; color: inherit;
    transition: background 0.15s ease, padding 0.15s ease;
  }
  .item-link:hover { background: var(--hover); padding-left: 1.1rem; padding-right: 1.1rem; }
  .item-title { font-size: clamp(1.05rem, 2.4vw, 1.35rem); font-weight: 500;
                letter-spacing: -0.01em; }
  .item-date { color: var(--muted); font-size: 0.82rem; white-space: nowrap;
               font-variant-numeric: tabular-nums; }
  .empty { padding: 2rem 0.5rem; color: var(--muted); border-bottom: 1px solid var(--line); }
  footer { margin-top: 12vh; color: var(--muted); font-size: 0.75rem;
           letter-spacing: 0.05em; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>TNB Pages</h1>
      <div class="subtitle">TNBfolio market intelligence — archive</div>
      <div class="count">1 report</div>
    </header>
    <ul>
      <li class="item">
        <a class="item-link" href="reports/20260706-161153-k-beauty-global-expansion-test.html">
          <span class="item-title">K-Beauty Global Expansion (test)</span>
          <span class="item-date">2026.07.06 16:11</span>
        </a>
      </li>
    </ul>
    <footer>© TNBfolio</footer>
  </div>
</body>
</html>
